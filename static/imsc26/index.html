<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IMSC 2026 Schedule</title>

  <style>
    :root {
      color-scheme: light;
      --paper: #fafafa;
      --panel: #ffffff;
      --ink: #181c1f;
      --muted: #687076;
      --line: #e4e6e8;
      --line-strong: #cfd4d8;
      --accent: #1f5f8b;
      --accent-soft: #eaf2fb;
      --red: #a34343;
      --red-soft: #fbebeb;
      --gold: #966217;
      --gold-soft: #f8f0df;
      --green: #476b3c;
      --green-soft: #edf4e9;
      --shadow: 0 12px 28px rgba(24, 28, 31, 0.06);
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    [hidden] { display: none !important; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: var(--paper);
      color: var(--ink);
    }

    button, select, input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr;
    }

    main {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 0 clamp(12px, 2.2vw, 24px) clamp(12px, 2.2vw, 24px);
    }

    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
    }

    .summary-strip {
      display: block;
      gap: 12px;
      align-items: center;
      background: rgba(250, 250, 250, 0.94);
      border-bottom: 1px solid var(--line);
      padding: 9px 0;
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .summary-title {
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.28rem);
      line-height: 1.2;
      font-weight: 760;
    }

    .schedule-title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 360px);
      align-items: center;
      gap: 8px;
    }

    .schedule-heading {
      white-space: nowrap;
    }

    .schedule-view-select {
      width: 100%;
      justify-self: end;
      min-width: 0;
    }

    .content {
      min-height: 500px;
      min-width: 0;
    }

    .day-section {
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      overflow: hidden;
    }

    .day-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: #f5f6f7;
      border-bottom: 1px solid var(--line);
    }

    .day-header h2 {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 760;
    }

    .day-header span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .event-list {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .event-card {
      --event-color: var(--accent);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 7px;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    .event-card[data-audience="everyone"] { --event-color: #4b5563; border-left-color: var(--event-color); }
    .event-card[data-audience="instructors-students"] { --event-color: #7c3aed; border-left-color: var(--event-color); }
    .event-card[data-audience="instructors-leaders"] { --event-color: #b45309; border-left-color: var(--event-color); }
    .event-card[data-audience="leaders-students"] { --event-color: #0f766e; border-left-color: var(--event-color); }
    .event-card[data-audience="instructors"] { --event-color: #dc2626; border-left-color: var(--event-color); }
    .event-card[data-audience="students"] { --event-color: #2563eb; border-left-color: var(--event-color); }

    .event-card[data-status="past"] {
      border-color: #e8eaec;
      border-left-color: #c9ced3;
      background: #f8f9fa;
      box-shadow: none;
    }

    .event-card[data-status="past"] .time,
    .event-card[data-status="past"] .event-title,
    .event-card[data-status="past"] .event-meta,
    .event-card[data-status="past"] .group-tile,
    .event-card[data-status="past"] .group-tile strong,
    .event-card[data-status="past"] .group-tile span {
      color: #81888e;
    }

    .event-card[data-status="past"] .tag {
      color: #777f86;
      background: #eef0f1;
    }

    .event-card[data-status="current"] {
      border-color: var(--line);
      border-left-color: var(--event-color);
      box-shadow: 0 12px 24px rgba(24, 28, 31, 0.08);
    }

    .event-progress {
      position: absolute;
      left: 0;
      right: 0;
      top: var(--progress);
      height: 1px;
      background: color-mix(in srgb, var(--event-color) 38%, transparent);
      pointer-events: none;
      z-index: 0;
    }

    .event-topline {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: start;
      gap: 9px;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      color: var(--ink);
      white-space: nowrap;
      line-height: 1.25;
    }

    .event-title {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .tag {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--accent);
      background: var(--accent-soft);
      white-space: nowrap;
    }

    .tag.everyone { color: #374151; background: #eef0f3; }
    .tag.instructors-students { color: #6d28d9; background: #f0e9ff; }
    .tag.instructors-leaders { color: #92400e; background: #fef3c7; }
    .tag.leaders-students { color: #0f766e; background: #ccfbf1; }
    .tag.instructors { color: #b91c1c; background: #fee2e2; }
    .tag.students { color: #1d4ed8; background: #dbeafe; }

    .event-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
      overflow-wrap: anywhere;
      white-space: pre-line;
    }

    .mini-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 7px;
      margin-top: 2px;
    }

    .group-tile {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 7px;
      background: #fcfcfc;
      min-width: 0;
    }

    .group-tile strong {
      display: inline-block;
      color: var(--accent);
      font-size: 0.79rem;
      line-height: inherit;
      font-weight: 750;
    }

    .group-tile span {
      color: var(--muted);
      font-size: 0.79rem;
      overflow-wrap: anywhere;
    }

    .empty {
      padding: 30px 18px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }

    .timeline-toggle {
      display: flex;
      justify-content: flex-start;
      margin: 0 0 12px;
    }

    .timeline-toggle button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      font-size: 0.86rem;
      font-weight: 750;
    }

    .timeline-toggle button:hover {
      border-color: var(--line-strong);
      background: #f5f6f7;
    }

    .completion-card {
      padding: 24px 18px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .completion-card h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.3;
    }

    .completion-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    @media (max-width: 640px) {
      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
      }

      main {
        width: 100%;
        max-width: 100vw;
        padding: 0 10px 10px;
      }

      .summary-strip {
        gap: 8px;
        padding: 8px 0;
        max-width: 100%;
      }

      .schedule-title-row {
        grid-template-columns: max-content minmax(0, 1fr);
        gap: 7px;
      }

      .schedule-view-select {
        grid-column: 2;
      }

      .event-topline {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0 8px;
      }

      .time {
        grid-column: 1;
        grid-row: 1;
        font-size: 0.86rem;
      }

      .event-topline > div:nth-child(2) {
        grid-column: 1 / 3;
        grid-row: 2;
      }

      .event-title {
        font-size: 0.92rem;
      }

      .tag {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        width: max-content;
        max-width: 42vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mini-grid {
        grid-template-columns: 1fr;
      }

      .group-tile {
        display: block;
      }
    }

    @media (max-width: 420px) {
    }
  </style>
</head>

    function normalizeName(name) {
      const cleaned = name
        .trim()
        .replace(/^[(]+/, "");
      const aliases = {
        "Ziling Jiang": "Zilin Jiang",
        "Cipriana Anghel": "Cipriana Anghel-Stan",

      };
      return aliases[cleaned] || cleaned;

    function parseLecture(raw) {
      const cut = raw.lastIndexOf("-");
      if (cut === -1) return { title: raw.trim(), instructor: "" };
      return {
        title: raw.slice(0, cut).trim(),
        instructor: normalizeName(raw.slice(cut + 1))
      };
    }

    function lectureFullTitle(instructor, lectureCode) {
      return LECTURE_FULL_TITLES[`${instructor}|${lectureCode}`] || "";
    }

    function buildEvents() {
      const events = [];
      SESSION_DATA.forEach((session, sessionIndex) => {
        GROUP_ORDER.forEach(group => {
          session.entries[group].forEach((raw, index) => {
            const parsed = parseLecture(raw);
            const lectureSession = `Session ${index * SESSION_DATA.length + sessionIndex + 1}`;
            events.push({
              id: `${lectureSession}-${group}-${index}`,
              date: WEEK_ONE_DATES[index],
              start: session.start,
              end: session.end,
              kind: "classroom",
              type: "Classroom Lecture",
              session: lectureSession,
              title: parsed.title,
              fullTitle: lectureFullTitle(parsed.instructor, parsed.title),
              instructors: [parsed.instructor],
              groups: [group],
              teams: GROUPS[group].teams,
              teamList: LECTURE_GROUP_TEAMS[group],
              location: GROUPS[group].location

        if (["overall", "instructor", "group"].includes(saved.perspective)) next.perspective = saved.perspective;
        if (typeof saved.instructor === "string") next.instructor = saved.instructor;
        if (typeof saved.group === "string") next.group = migrateSelectedTeam(saved.group);
        if (typeof saved.showPastEvents === "boolean") next.showPastEvents = saved.showPastEvents;
        return next;
      } catch {
        return {};

    function migrateSelectedTeam(value) {
      const aliases = {
        "Hong Kong-China": "Hong Kong China",
        "Macau-China": "Macau China",
        "China-Hubei (Wuhan)": "China Hubei Wuhan"
      };
      if (aliases[value]) return aliases[value];
      if (TEAM_ORDER.includes(value)) return value;
      if (GROUPS[value]) return LECTURE_GROUP_TEAMS[value]?.[0] || TEAM_ORDER[0];
      return TEAM_ORDER[0];

      const [hours, mins] = time.split(":").map(Number);
      return hours * 60 + mins;
    }

    function localDateString(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function eventDateTime(event, timeKey) {
      return new Date(`${event.date}T${event[timeKey]}:00`);
    }

    function eventStatus(event, now = new Date()) {
      if (now >= eventDateTime(event, "end")) return "past";
      if (now >= eventDateTime(event, "start")) return "current";
      return "future";
    }

    function eventProgress(event, now = new Date()) {
      const start = eventDateTime(event, "start").getTime();
      const end = eventDateTime(event, "end").getTime();
      const elapsed = now.getTime() - start;
      return Math.min(100, Math.max(0, (elapsed / (end - start)) * 100));
    }

    function compareEvents(a, b) {
      return a.date.localeCompare(b.date) || minutes(a.start) - minutes(b.start) || a.title.localeCompare(b.title);
    }

    function dayFor(date) {
      return DAY_META.find(day => day.date === date);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function formatTime(start, end) {
      return `${start}-${end}`;
    }

    function selectedLectureGroup() {
      return TEAM_TO_LECTURE_GROUP[state.group];
    }

    function groupLocation(group) {
      return GROUPS[group]?.location ? `Room ${GROUPS[group].location}` : "";
    }

    function hasGroupLocation(event) {
      return ["classroom", "test", "problem", "study"].includes(event.kind);
    }

    function locationForEvent(event) {
      if (event.location) return event.location;
      if (!hasGroupLocation(event)) return "";
      if (event.kind === "classroom") return groupLocation(event.groups[0]);
      if (state.perspective === "group") return groupLocation(selectedLectureGroup());
      const groups = event.groups?.length ? event.groups : GROUP_ORDER;
      return `Group rooms: ${groups.map(group => `${group} ${GROUPS[group].location}`).join(", ")}`;
    }

    function dateRange() {
      return DAY_META.map(day => day.date);
    }

    function appliesToPerspective(event) {
      if (state.perspective === "overall") return true;
      if (state.perspective === "instructor") return eventInvolvesInstructor(event);
      if (state.perspective === "group") {
        if (event.kind === "classroom" || event.kind === "test" || event.kind === "problem") return event.groups.includes(selectedLectureGroup());
        if (event.kind === "philosophy") return event.teams.includes(state.group);
        return eventInvolvesTeam(event);
      }
      return false;
    }

    function eventInvolvesInstructor(event) {
      const audience = audienceForEvent(event);
      if (audience === "everyone" || audience === "instructors" || audience === "instructors-leaders") return true;
      if (audience !== "instructors-students") return false;
      if (event.kind === "classroom" || event.kind === "test" || event.kind === "problem") return event.instructors.includes(state.instructor);
      if (event.kind === "philosophy") return event.instructors.includes(state.instructor);
      return true;
    }

    function eventInvolvesTeam(event) {
      const audience = audienceForEvent(event);
      return [
        "everyone",
        "instructors-students",
        "instructors-leaders",
        "leaders-students",
        "leaders",
        "students"
      ].includes(audience);
    }

    function filteredBaseEvents() {
      const dates = new Set(dateRange());
      return allEvents.filter(event => {
        if (!dates.has(event.date)) return false;
        return appliesToPerspective(event);
      });
    }

    function displayEvents() {
      const events = filteredBaseEvents();
      if (state.perspective !== "overall") return events;

      const combined = [];
      const groups = new Map();
      events.forEach(event => {
        if (event.kind !== "classroom" && event.kind !== "test" && event.kind !== "problem" && event.kind !== "philosophy") {
          combined.push(event);
          return;
        }
        const key = `${event.date}|${event.start}|${event.end}|${event.session}`;
        if (!groups.has(key)) {
          groups.set(key, {
            id: `combined-${key}`,
            date: event.date,
            start: event.start,
            end: event.end,
            kind: "combined",
            type: event.kind === "classroom" ? "Classroom Lectures" : event.type,
            session: event.session,
            title: event.title,
            instructors: [],
            groups: [],
            children: []
          });
        }
        groups.get(key).children.push(event);
      });
      groups.forEach(group => {
        group.children.sort((a, b) => (a.parallelLabel || a.groups[0]).localeCompare(b.parallelLabel || b.groups[0], undefined, { numeric: true }));
        group.groups = group.children.flatMap(event => event.groups);
        group.instructors = Array.from(new Set(group.children.flatMap(event => event.instructors))).sort();
        combined.push(group);
      });
      return combined.sort(compareEvents);
    }

    function setupControls() {
      const scheduleViewSelect = document.getElementById("scheduleViewSelect");
      scheduleViewSelect.innerHTML = `
        <optgroup label="Overall">
          <option value="overall">Overall</option>
        </optgroup>
        <optgroup label="Instructor">
          ${instructors.map(name => `<option value="instructor:${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("")}
        </optgroup>
        <optgroup label="Team">
          ${TEAM_ORDER.map(team => `<option value="team:${escapeHtml(team)}">${escapeHtml(team)}</option>`).join("")}
        </optgroup>
      `;

      scheduleViewSelect.addEventListener("change", () => {
        applyScheduleSelection(scheduleViewSelect.value);
        saveState();
        render();
      });
    }

    function syncControls(source = state) {
      document.getElementById("scheduleViewSelect").value = scheduleSelectionValue(source);
    }

    function scheduleSelectionValue(source = state) {
      if (source.perspective === "instructor") return `instructor:${source.instructor}`;
      if (source.perspective === "group") return `team:${source.group}`;
      return "overall";
    }

    function applyScheduleSelection(value) {
      if (value === "overall") {
        state.perspective = "overall";
        return;
      }
      if (value.startsWith("instructor:")) {
        state.perspective = "instructor";
        state.instructor = value.slice("instructor:".length);
        return;
      }
      if (value.startsWith("team:")) {
        state.perspective = "group";
        state.group = value.slice("team:".length);
      }
    }

    function renderSchedule(events) {
      const content = document.getElementById("content");
      if (!events.length) {
        content.innerHTML = `<div class="empty">No events match this selection.</div>`;
        return;
      }
      const now = new Date();
      const today = localDateString(now);
      const firstDate = DAY_META[0].date;
      const hasPastDayEvents = events.some(event => event.date < today);
      const hasCurrentOrFutureEvents = events.some(event => eventStatus(event, now) !== "past");
      const shouldShowPastToggle = today > firstDate && hasPastDayEvents;
      const sections = [];
      let insertedToggle = false;

      if (!hasCurrentOrFutureEvents) {
        if (shouldShowPastToggle) sections.push(renderPastToggle());
        sections.push(renderCompletionCard());
        if (!state.showPastEvents) {
          content.innerHTML = sections.join("");
          bindPastToggle();
          return;
        }
      }

      dateRange().forEach(date => {
        const day = dayFor(date);
        const dayEvents = events.filter(event => event.date === date);
        if (!day || !dayEvents.length) return;
        if (!state.showPastEvents && date < today) return;
        if (!insertedToggle && shouldShowPastToggle && date >= today) {
          sections.push(renderPastToggle());
          insertedToggle = true;
        }
        sections.push(`
          <section class="day-section">
            <div class="day-header">
              <h2>${day.weekday}</h2>
              <span>${day.short}, 2026</span>
            </div>
            <div class="event-list">
              ${dayEvents.map(event => renderEventCard(event, now)).join("")}
            </div>
          </section>
        `);
      });
      if (!insertedToggle && shouldShowPastToggle && state.showPastEvents && hasCurrentOrFutureEvents) {
        sections.unshift(renderPastToggle());
      }
      content.innerHTML = sections.join("") || `<div class="empty">No events match this selection.</div>`;
      bindPastToggle();
    }

    function renderPastToggle() {
      return `
        <div class="timeline-toggle">
          <button type="button" id="pastToggle">${state.showPastEvents ? "Hide past events" : "Show past events"}</button>
        </div>
      `;
    }

    function renderCompletionCard() {
      return `
        <article class="completion-card">
          <h2>All scheduled events have wrapped up.</h2>
          <p>Thanks for being part of IMSC 2026.</p>
        </article>
      `;
    }

    function bindPastToggle() {
      const button = document.getElementById("pastToggle");
      if (!button) return;
      button.addEventListener("click", () => {
        state.showPastEvents = !state.showPastEvents;
        saveState();
        render();
      });
    }

    function tagClass(event) {
      return audienceForEvent(event);
    }

    function kindForCard(event) {
      if (event.kind === "guest") return "guest";
      if (event.kind === "seminar") return "seminar";
      if (event.kind === "showcase") return "large";
      if (event.kind === "problem") return "problem";
      if (event.kind === "competition") return "competition";
      if (event.kind === "test") return "test";
      if (event.kind === "excursion") return "excursion";
      if (event.kind === "ceremony") return "ceremony";
      if (event.kind === "meeting") return "meeting";
      if (event.kind === "philosophy") return "philosophy";
      if (event.kind === "staff") return "staff";
      return event.kind;
    }

    function audienceForEvent(event) {
      if (event.audience) return event.audience;
      if (event.kind === "classroom" || event.kind === "combined" || event.kind === "problem" || event.kind === "philosophy" || event.kind === "test" || event.kind === "competition") {
        return "instructors-students";
      }
      if (event.kind === "excursion") return "students";
      if (event.kind === "meeting") return "instructors-leaders";
      if (event.kind === "staff") return "instructors";
      if (event.kind === "showcase" || event.kind === "seminar" || event.kind === "guest" || event.kind === "ceremony") {
        return "everyone";
      }
      return "everyone";
    }

    function eventDisplayTitle(event) {
      if (event.kind === "combined" && (event.children[0]?.kind === "test" || event.children[0]?.kind === "problem")) return `${event.session}: ${event.title}`;
      if (event.kind === "combined") return event.session;
      if (event.kind === "classroom" && state.perspective !== "overall") return `${event.session}: ${event.title}`;
      if (event.kind === "classroom") return `${event.session} · ${event.title}`;
      if (event.kind === "philosophy") return event.session;
      if (event.kind === "showcase" || event.kind === "seminar" || event.kind === "guest") return event.session;
      if (event.kind === "test") return `${event.session}: ${event.title}`;
      if (event.kind === "excursion") return `${event.session}: ${event.title}`;
      if (event.kind === "competition") return event.session;
      if (event.kind === "problem") return `${event.session}: ${event.title}`;
      if (!event.title) return event.session;
      return `${event.session}: ${event.title}`;
    }

    function eventDetailLine(event, separator = "\n") {
      if (event.kind === "combined") {
        return "";
      }
      if (event.kind === "showcase") {
        return event.title
          .split(";")
          .map((problem, index) => [event.instructors[index], problem.trim(), event.location].filter(Boolean).join(" · "))
          .join(separator);
      }
      if (event.kind === "seminar" || event.kind === "guest") {
        const title = event.title === "TBD" ? "" : event.title;
        return [event.instructors?.[0], title].filter(Boolean).join(" · ");
      }
      if (event.kind === "philosophy") {
        return [
          event.instructors.join(", "),
          `${event.parallelLabel} (${event.teams.join(", ")})`,
          event.location
        ].filter(Boolean).join(" · ");
      }
      if ((event.kind === "test" || event.kind === "problem") && state.perspective !== "overall") {
        return `${event.instructors.join(" / ")} · ${event.groups[0]} (${event.teams}) · ${groupLocation(event.groups[0])}`;
      }
      if (event.kind === "competition") {
        return [event.location, event.title].filter(Boolean).join(" · ");
      }
      if (event.kind === "excursion") return "";
      if (event.kind === "test") {
        return event.title;
      }
      if (event.kind === "classroom" && state.perspective !== "overall") {
        return [event.instructors[0], `${event.groups[0]} (${event.teams})`, event.fullTitle, groupLocation(event.groups[0])].filter(Boolean).join(" · ");
      }
      return event.instructors?.length ? event.instructors.join(", ") : "";
    }

    function renderEventCard(event, now = new Date()) {
      const detailLine = eventDetailLine(event);
      const groupLine = event.kind === "classroom" && state.perspective === "overall" ? [event.instructors[0], `${event.groups[0]} (${event.teams})`, event.fullTitle].filter(Boolean).join(" · ") : "";
      const locationLine = event.kind === "problem" || event.kind === "philosophy" || event.kind === "showcase" || event.kind === "competition" || ((event.kind === "classroom" || event.kind === "test") && state.perspective !== "overall") ? "" : locationForEvent(event);
      const meta = event.children
        ? detailLine
        : [detailLine, groupLine, locationLine].filter(Boolean).join(" · ");
      const status = eventStatus(event, now);
      const progress = status === "current" ? eventProgress(event, now).toFixed(2) : "";
      const audience = audienceForEvent(event);
      return `
        <article class="event-card" data-kind="${kindForCard(event)}" data-audience="${audience}" data-status="${status}">
          ${status === "current" ? `<span class="event-progress" style="--progress:${progress}%"></span>` : ""}
          <div class="event-topline">
            <div class="time">${formatTime(event.start, event.end)}</div>
            <div>
              <h3 class="event-title">${escapeHtml(eventDisplayTitle(event))}</h3>
              ${meta ? `<p class="event-meta">${escapeHtml(meta)}</p>` : ""}
            </div>
            <span class="tag ${tagClass(event)}">${escapeHtml(event.type)}</span>
          </div>
          ${event.children ? renderMiniGrid(event.children) : ""}
        </article>
      `;
    }

    function renderMiniGrid(children) {
      return `
        <div class="mini-grid">
          ${children.map(event => `
            <div class="group-tile">
              <strong>${escapeHtml(event.parallelLabel || event.groups[0])}</strong>
              <span>${escapeHtml(miniGridDetail(event))}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function miniGridDetail(event) {
      if (event.kind === "philosophy") {
        return `${event.instructors.join(" / ")} · ${event.teams.join(", ")} · ${event.location}`;
      }
      const location = String(event.location).startsWith("Room ") ? event.location : `Room ${event.location}`;
      if (event.kind === "test" || event.kind === "problem") {
        return `${event.instructors.join(" / ")} · ${location}`;
      }
      return [event.instructors.join(" / "), event.title, event.fullTitle, location].filter(Boolean).join(" · ");
    }

    function render() {
      const previousState = JSON.stringify(state);
      if (!instructors.includes(state.instructor)) state.instructor = instructors[0];
      if (!TEAM_ORDER.includes(state.group)) state.group = migrateSelectedTeam(state.group);
      if (JSON.stringify(state) !== previousState) saveState();
      syncControls();
      const events = displayEvents();
      renderSchedule(events);
    }

    setupControls();
    render();
    setInterval(() => {
      render();
    }, 60000);
  </script>
</body>
</html>
