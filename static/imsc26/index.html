<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IMSC 2026 Schedule</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fafafa;
      --panel: #ffffff;
      --ink: #181c1f;
      --muted: #687076;
      --line: #e4e6e8;
      --line-strong: #cfd4d8;
      --accent: #1f5f8b;
      --accent-soft: #eaf2fb;
      --red: #a34343;
      --red-soft: #fbebeb;
      --gold: #966217;
      --gold-soft: #f8f0df;
      --green: #476b3c;
      --green-soft: #edf4e9;
      --shadow: 0 12px 28px rgba(24, 28, 31, 0.06);
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    [hidden] { display: none !important; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: var(--paper);
      color: var(--ink);
    }

    button, select, input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: rgba(250, 250, 250, 0.94);
      color: var(--ink);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .topbar {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 16px clamp(12px, 3vw, 30px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.5vw, 2.05rem);
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 780;
    }

    .config-button {
      justify-self: end;
      min-width: clamp(64px, 8vw, 88px);
      height: clamp(30px, 3.2vw, 36px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      padding: 0 clamp(9px, 1.4vw, 14px);
      font-size: clamp(0.78rem, 1.4vw, 0.9rem);
      font-weight: 750;
      line-height: 1;
    }

    .config-button:hover {
      border-color: var(--line-strong);
      background: #f5f6f7;
    }

    .settings-dialog {
      width: min(980px, calc(100vw - 24px));
      max-height: min(760px, calc(100vh - 24px));
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 24px 70px rgba(24, 28, 31, 0.22);
    }

    .settings-dialog::backdrop {
      background: rgba(24, 28, 31, 0.34);
      backdrop-filter: blur(3px);
    }

    .settings-panel {
      display: grid;
      gap: 0;
    }

    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .settings-head h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .settings-body {
      padding: 14px;
      overflow: auto;
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--line);
    }

    .confirm-button {
      min-height: 38px;
      border: 0;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      padding: 0 16px;
      font-weight: 750;
    }

    main {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 2.2vw, 24px);
    }

    .controls {
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(250px, 1fr);
      align-items: start;
      margin-bottom: 12px;
    }

    .control-section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      min-width: 0;
    }

    .control-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .segmented {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #f3f4f5;
    }

    .segmented button {
      border: 0;
      border-right: 1px solid var(--line);
      padding: 8px 7px;
      background: transparent;
      color: var(--ink);
      min-height: 36px;
      font-weight: 700;
      font-size: 0.91rem;
    }

    .segmented button:last-child {
      border-right: 0;
    }

    .segmented button[aria-pressed="true"] {
      background: var(--ink);
      color: #fff;
    }

    .select-row {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 750;
    }

    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
    }

    .summary-strip {
      display: block;
      gap: 12px;
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }

    .summary-title {
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.28rem);
      line-height: 1.2;
      font-weight: 760;
    }

    .summary-meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      white-space: pre-line;
    }

    .content {
      min-height: 500px;
      min-width: 0;
    }

    .day-section {
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      overflow: hidden;
    }

    .day-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: #f5f6f7;
      border-bottom: 1px solid var(--line);
    }

    .day-header h2 {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 760;
    }

    .day-header span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .event-list {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .event-card {
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 7px;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    .event-card[data-kind="large"] { border-left-color: var(--red); }
    .event-card[data-kind="combined"] { border-left-color: var(--accent); }
    .event-card[data-kind="seminar"] { border-left-color: var(--gold); }
    .event-card[data-kind="guest"] { border-left-color: var(--green); }
    .event-card[data-kind="test"] { border-left-color: #7c4d9e; }
    .event-card[data-kind="problem"] { border-left-color: #8a5b25; }
    .event-card[data-kind="competition"] { border-left-color: #b48a21; }

    .event-card[data-status="past"] {
      border-color: #e8eaec;
      border-left-color: #c9ced3;
      background: #f8f9fa;
      box-shadow: none;
    }

    .event-card[data-status="past"] .time,
    .event-card[data-status="past"] .event-title,
    .event-card[data-status="past"] .event-meta,
    .event-card[data-status="past"] .group-tile,
    .event-card[data-status="past"] .group-tile strong,
    .event-card[data-status="past"] .group-tile span {
      color: #81888e;
    }

    .event-card[data-status="past"] .tag {
      color: #777f86;
      background: #eef0f1;
    }

    .event-card[data-status="current"] {
      border-color: rgba(31, 95, 139, 0.38);
      box-shadow: 0 12px 24px rgba(31, 95, 139, 0.10);
    }

    .event-progress {
      position: absolute;
      left: 0;
      right: 0;
      top: var(--progress);
      height: 1px;
      background: rgba(31, 95, 139, 0.28);
      pointer-events: none;
      z-index: 0;
    }

    .event-topline {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: start;
      gap: 9px;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      color: var(--ink);
      white-space: nowrap;
      padding-top: 2px;
    }

    .event-title {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .tag {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--accent);
      background: var(--accent-soft);
      white-space: nowrap;
    }

    .tag.large { color: var(--red); background: var(--red-soft); }
    .tag.guest { color: var(--green); background: var(--green-soft); }
    .tag.showcase { color: var(--accent); background: var(--accent-soft); }
    .tag.seminar { color: var(--gold); background: var(--gold-soft); }
    .tag.test { color: #7c4d9e; background: #f1e9f8; }
    .tag.problem { color: #8a5b25; background: #f7eddf; }
    .tag.competition { color: #7a5b05; background: #fbf1c8; }

    .event-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
      overflow-wrap: anywhere;
      white-space: pre-line;
    }

    .mini-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 7px;
      margin-top: 2px;
    }

    .group-tile {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 7px;
      background: #fcfcfc;
      min-width: 0;
    }

    .group-tile strong {
      display: inline-block;
      color: var(--accent);
      font-size: 0.79rem;
      line-height: inherit;
      font-weight: 750;
    }

    .group-tile span {
      color: var(--muted);
      font-size: 0.79rem;
      overflow-wrap: anywhere;
    }

    .empty {
      padding: 30px 18px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }

    .timeline-toggle {
      display: flex;
      justify-content: flex-start;
      margin: 0 0 12px;
    }

    .timeline-toggle button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      font-size: 0.86rem;
      font-weight: 750;
    }

    .timeline-toggle button:hover {
      border-color: var(--line-strong);
      background: #f5f6f7;
    }

    .completion-card {
      padding: 24px 18px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .completion-card h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.3;
    }

    .completion-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    @media (max-width: 980px) {
      .controls,
      .summary-strip {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 640px) {
      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
      }

      .topbar {
        width: 100%;
        max-width: 100vw;
        padding: 12px;
        gap: 8px;
      }

      main {
        width: 100%;
        max-width: 100vw;
        padding: 10px;
      }

      h1 {
        font-size: 1.35rem;
      }

      .controls {
        gap: 8px;
        margin-bottom: 10px;
        max-width: 100%;
      }

      .control-section {
        padding: 10px;
        max-width: 100%;
      }

      .control-title {
        margin-bottom: 7px;
      }

      .segmented button {
        min-height: 34px;
        padding: 7px 5px;
        font-size: 0.86rem;
      }

      .summary-strip {
        gap: 8px;
        padding: 10px;
        max-width: 100%;
      }

      .summary-meta {
        font-size: 0.84rem;
      }

      .event-topline {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6px 8px;
      }

      .time {
        grid-column: 1;
        grid-row: 1;
        font-size: 0.86rem;
      }

      .event-topline > div:nth-child(2) {
        grid-column: 1 / 3;
        grid-row: 2;
      }

      .event-title {
        font-size: 0.92rem;
      }

      .tag {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        width: max-content;
        max-width: 42vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mini-grid {
        grid-template-columns: 1fr;
      }

      .group-tile {
        display: block;
      }

      .settings-dialog {
        width: calc(100vw - 20px);
        max-height: calc(100vh - 20px);
      }

      .settings-body {
        padding: 10px;
      }
    }

    @media (max-width: 420px) {
      h1 {
        max-width: none;
      }

    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="topbar">
        <h1>IMSC 2026 Schedule</h1>
        <button type="button" class="config-button" id="openSettings">Settings</button>
      </div>
    </header>

    <dialog class="settings-dialog" id="settingsDialog">
      <div class="settings-panel">
        <div class="settings-head">
          <h2>Settings</h2>
        </div>
        <div class="settings-body">
      <section class="controls" aria-label="Schedule controls">
        <div class="control-section">
          <p class="control-title">Perspective</p>
          <div class="segmented" role="group" aria-label="Perspective">
            <button type="button" data-set="perspective" data-value="overall">Overall</button>
            <button type="button" data-set="perspective" data-value="instructor">Instructor</button>
            <button type="button" data-set="perspective" data-value="group">Team</button>
          </div>
          <div class="select-row" id="instructorRow">
            <label for="instructorSelect">Instructor or speaker</label>
            <select id="instructorSelect"></select>
          </div>
          <div class="select-row" id="groupRow">
            <label for="groupSelect">Team group</label>
            <select id="groupSelect"></select>
          </div>
        </div>
      </section>
        </div>
        <div class="settings-actions">
          <button type="button" class="confirm-button" id="confirmSettings">Confirm</button>
        </div>
      </div>
    </dialog>

    <main>
      <section class="summary-strip" aria-live="polite">
        <div>
          <h2 class="summary-title" id="summaryTitle"></h2>
          <p class="summary-meta" id="summaryMeta"></p>
        </div>
      </section>

      <section class="content" id="content" aria-live="polite"></section>
    </main>
  </div>

    function normalizeName(name) {
      const cleaned = name
        .trim()
        .replace(/^[(]+/, "");
      const aliases = {
        "Ziling Jiang": "Zilin Jiang",
        "Cipriana Anghel": "Cipriana Anghel-Stan",

    function parseLecture(raw) {
      const cut = raw.lastIndexOf("-");
      if (cut === -1) return { title: raw.trim(), instructor: "" };
      return {
        title: raw.slice(0, cut).trim(),
        instructor: normalizeName(raw.slice(cut + 1))
      };
    }

    function buildEvents() {
      const events = [];
      SESSION_DATA.forEach(session => {
        GROUP_ORDER.forEach(group => {
          session.entries[group].forEach((raw, index) => {
            const parsed = parseLecture(raw);
            events.push({
              id: `${session.session}-${group}-${index}`,
              date: WEEK_ONE_DATES[index],
              start: session.start,
              end: session.end,
              kind: "classroom",
              type: "Classroom Lecture",
              session: session.session,
              title: parsed.title,
              instructors: [parsed.instructor],
              groups: [group],
              teams: GROUPS[group].teams,
              location: GROUPS[group].location
            });
          });
        });
      });

      LARGE_EVENTS.forEach((event, index) => {
        events.push({
          ...event,
          id: `large-${index}`,
          instructors: event.speakers.map(normalizeName),
          groups: GROUP_ORDER
        });
      });

      TEST_EVENTS.forEach((event, index) => {
        events.push({
          ...event,
          id: `test-${index}`,
          instructors: [],
          groups: GROUP_ORDER,
          global: true
        });
      });

      return events.sort(compareEvents);
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const next = {};
        if (["overall", "instructor", "group"].includes(saved.perspective)) next.perspective = saved.perspective;
        if (typeof saved.instructor === "string") next.instructor = saved.instructor;
        if (typeof saved.group === "string") next.group = saved.group;
        if (typeof saved.showPastEvents === "boolean") next.showPastEvents = saved.showPastEvents;
        return next;
      } catch {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function minutes(time) {
      const [hours, mins] = time.split(":").map(Number);
      return hours * 60 + mins;
    }

    function localDateString(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function eventDateTime(event, timeKey) {
      return new Date(`${event.date}T${event[timeKey]}:00`);
    }

    function eventStatus(event, now = new Date()) {
      if (now >= eventDateTime(event, "end")) return "past";
      if (now >= eventDateTime(event, "start")) return "current";
      return "future";
    }

    function eventProgress(event, now = new Date()) {
      const start = eventDateTime(event, "start").getTime();
      const end = eventDateTime(event, "end").getTime();
      const elapsed = now.getTime() - start;
      return Math.min(100, Math.max(0, (elapsed / (end - start)) * 100));
    }

    function compareEvents(a, b) {
      return a.date.localeCompare(b.date) || minutes(a.start) - minutes(b.start) || a.title.localeCompare(b.title);
    }

    function dayFor(date) {
      return DAY_META.find(day => day.date === date);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function formatTime(start, end) {
      return `${start}-${end}`;
    }

    function groupLocation(group) {
      return GROUPS[group]?.location ? `Room ${GROUPS[group].location}` : "";
    }

    function hasGroupLocation(event) {
      return ["classroom", "test", "problem", "study"].includes(event.kind);
    }

    function locationForEvent(event) {
      if (!hasGroupLocation(event)) return "";
      if (event.kind === "classroom") return groupLocation(event.groups[0]);
      if (state.perspective === "group") return groupLocation(state.group);
      const groups = event.groups?.length ? event.groups : GROUP_ORDER;
      return `Group rooms: ${groups.map(group => `${group} ${GROUPS[group].location}`).join(", ")}`;
    }

    function dateRange() {
      return DAY_META.map(day => day.date);
    }

    function appliesToPerspective(event) {
      if (event.global) return true;
      if (state.perspective === "overall") return true;
      if (state.perspective === "group") {
        return event.kind !== "classroom" || event.groups.includes(state.group);
      }
      if (INSTRUCTOR_WIDE_KINDS.has(event.kind)) return true;
      return event.instructors.includes(state.instructor);
    }

    function filteredBaseEvents() {
      const dates = new Set(dateRange());
      return allEvents.filter(event => {
        if (!dates.has(event.date)) return false;
        return appliesToPerspective(event);
      });
    }

    function displayEvents() {
      const events = filteredBaseEvents();
      if (state.perspective !== "overall") return events;

      const combined = [];
      const groups = new Map();
      events.forEach(event => {
        if (event.kind !== "classroom") {
          combined.push(event);
          return;
        }
        const key = `${event.date}|${event.start}|${event.end}|${event.session}`;
        if (!groups.has(key)) {
          groups.set(key, {
            id: `combined-${key}`,
            date: event.date,
            start: event.start,
            end: event.end,
            kind: "combined",
            type: "Classroom Lectures",
            session: event.session,
            title: "classroom lectures",
            instructors: [],
            groups: [],
            children: []
          });
        }
        groups.get(key).children.push(event);
      });
      groups.forEach(group => {
        group.children.sort((a, b) => a.groups[0].localeCompare(b.groups[0], undefined, { numeric: true }));
        group.groups = group.children.flatMap(event => event.groups);
        group.instructors = Array.from(new Set(group.children.flatMap(event => event.instructors))).sort();
        combined.push(group);
      });
      return combined.sort(compareEvents);
    }

    function setupControls() {

      instructorSelect.innerHTML = instructors.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("");

    function syncControls(source = state) {
      document.querySelectorAll("[data-set]").forEach(button => {
        button.setAttribute("aria-pressed", String(source[button.dataset.set] === button.dataset.value));
      });
      document.getElementById("instructorRow").hidden = source.perspective !== "instructor";
      document.getElementById("groupRow").hidden = source.perspective !== "group";
      document.getElementById("instructorSelect").value = source.instructor;
      document.getElementById("groupSelect").value = source.group;

    function renderSummary(events) {
      let title = "Overall camp schedule";
      let meta = "All group lectures and camp-wide events.";

      if (state.perspective === "group") {
        const group = GROUPS[state.group];
        title = `${state.group} schedule`;
        meta = `${group.teams}.\nHomeroom instructor: ${group.homeroom}. Room: ${group.location}.`;
      }

      if (state.perspective === "instructor") {
        const homerooms = GROUP_ORDER.filter(group => GROUPS[group].homeroom.split(" / ").includes(state.instructor));
        title = `${state.instructor}'s schedule`;
        meta = homerooms.length
          ? `Homeroom: ${homerooms.map(group => `${group} (${GROUPS[group].teams})`).join(", ")}.`
          : "Teaching, showcase, seminar, and guest lecture appearances.";
      }

      document.getElementById("summaryTitle").textContent = title;
      document.getElementById("summaryMeta").textContent = meta;
    }

    function renderSchedule(events) {
      const content = document.getElementById("content");
      if (!events.length) {
        content.innerHTML = `<div class="empty">No events match this selection.</div>`;
        return;
      }
      const now = new Date();
      const today = localDateString(now);
      const firstDate = DAY_META[0].date;
      const hasPastDayEvents = events.some(event => event.date < today);
      const hasCurrentOrFutureEvents = events.some(event => eventStatus(event, now) !== "past");
      const shouldShowPastToggle = today > firstDate && hasPastDayEvents;
      const sections = [];
      let insertedToggle = false;

      if (!hasCurrentOrFutureEvents) {
        if (shouldShowPastToggle) sections.push(renderPastToggle());
        sections.push(renderCompletionCard());
        if (!state.showPastEvents) {
          content.innerHTML = sections.join("");
          bindPastToggle();
          return;
        }
      }

      dateRange().forEach(date => {
        const day = dayFor(date);
        const dayEvents = events.filter(event => event.date === date);
        if (!day || !dayEvents.length) return;
        if (!state.showPastEvents && date < today) return;
        if (!insertedToggle && shouldShowPastToggle && date >= today) {
          sections.push(renderPastToggle());
          insertedToggle = true;
        }
        sections.push(`
          <section class="day-section">
            <div class="day-header">
              <h2>${day.weekday}</h2>
              <span>${day.short}, 2026</span>
            </div>
            <div class="event-list">
              ${dayEvents.map(event => renderEventCard(event, now)).join("")}
            </div>
          </section>
        `);
      });
      if (!insertedToggle && shouldShowPastToggle && state.showPastEvents && hasCurrentOrFutureEvents) {
        sections.unshift(renderPastToggle());
      }
      content.innerHTML = sections.join("") || `<div class="empty">No events match this selection.</div>`;
      bindPastToggle();
    }

    function renderPastToggle() {
      return `
        <div class="timeline-toggle">
          <button type="button" id="pastToggle">${state.showPastEvents ? "Hide past events" : "Show past events"}</button>
        </div>
      `;
    }

    function renderCompletionCard() {
      return `
        <article class="completion-card">
          <h2>All scheduled events have wrapped up.</h2>
          <p>Thanks for being part of IMSC 2026.</p>
        </article>
      `;
    }

    function bindPastToggle() {
      const button = document.getElementById("pastToggle");
      if (!button) return;
      button.addEventListener("click", () => {
        state.showPastEvents = !state.showPastEvents;
        saveState();
        render();
      });
    }

    function tagClass(event) {
      if (event.kind === "guest") return "guest";
      if (event.kind === "showcase") return "large";
      if (event.kind === "seminar") return "seminar large";
      if (event.kind === "test") return "test";
      if (event.kind === "problem") return "problem";
      if (event.kind === "competition") return "competition";
      if (event.kind === "combined") return "showcase";
      return "";
    }

    function kindForCard(event) {
      if (event.kind === "guest") return "guest";
      if (event.kind === "seminar") return "seminar";
      if (event.kind === "showcase") return "large";
      if (event.kind === "problem") return "problem";
      if (event.kind === "competition") return "competition";
      if (event.kind === "test") return "test";
      return event.kind;
    }

    function eventDisplayTitle(event) {
      if (event.kind === "combined") return event.session;
      if (event.kind === "classroom" && state.perspective !== "overall") return `${event.session}: ${event.title}`;
      if (event.kind === "classroom") return `${event.session} · ${event.title}`;
      if (event.kind === "showcase" || event.kind === "seminar" || event.kind === "guest") return event.session;
      if (event.kind === "test" || event.kind === "problem") return event.session;
      return `${event.session}: ${event.title}`;
    }

    function eventDetailLine(event, separator = "\n") {
      if (event.kind === "combined") {
        return `${event.children.length} group lectures`;
      }
      if (event.kind === "showcase") {
        return event.title
          .split(";")
          .map((problem, index) => [problem.trim(), event.instructors[index]].filter(Boolean).join(" · "))
          .join(separator);
      }
      if (event.kind === "seminar" || event.kind === "guest") {
        return [event.title, event.instructors?.[0]].filter(Boolean).join(" · ");
      }
      if (event.kind === "test" || event.kind === "problem") {
        return event.title;
      }
      if (event.kind === "classroom" && state.perspective !== "overall") {
        return `${event.instructors[0]} · ${event.groups[0]} (${event.teams}) · ${groupLocation(event.groups[0])}`;
      }
      return event.instructors?.length ? event.instructors.join(", ") : "";
    }

    function renderEventCard(event, now = new Date()) {
      const detailLine = eventDetailLine(event);
      const groupLine = event.kind === "classroom" && state.perspective === "overall" ? `${event.groups[0]} · ${event.teams}` : "";
      const locationLine = event.kind === "test" || event.kind === "problem" || (event.kind === "classroom" && state.perspective !== "overall") ? "" : locationForEvent(event);
      const meta = event.children
        ? detailLine
        : [detailLine, groupLine, locationLine].filter(Boolean).join(" | ");
      const status = eventStatus(event, now);
      const progress = status === "current" ? eventProgress(event, now).toFixed(2) : "";
      return `
        <article class="event-card" data-kind="${kindForCard(event)}" data-status="${status}">
          ${status === "current" ? `<span class="event-progress" style="--progress:${progress}%"></span>` : ""}
          <div class="event-topline">
            <div class="time">${formatTime(event.start, event.end)}</div>
            <div>
              <h3 class="event-title">${escapeHtml(eventDisplayTitle(event))}</h3>
              ${meta ? `<p class="event-meta">${escapeHtml(meta)}</p>` : ""}
            </div>
            <span class="tag ${tagClass(event)}">${escapeHtml(event.type)}</span>
          </div>
          ${event.children ? renderMiniGrid(event.children) : ""}
        </article>
      `;
    }

    function renderMiniGrid(children) {
      return `
        <div class="mini-grid">
          ${children.map(event => `
            <div class="group-tile">
              <strong>${event.groups[0]}</strong>
              <span>${escapeHtml(event.title)} &middot; ${escapeHtml(event.instructors[0])} &middot; Room ${escapeHtml(event.location)}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function render() {
      if (!instructors.includes(state.instructor)) state.instructor = instructors[0];
      if (!GROUPS[state.group]) state.group = GROUP_ORDER[0];
      syncControls();
      const events = displayEvents();
      renderSummary(events);
      renderSchedule(events);
    }

    setupControls();
    render();
    setInterval(() => {
      if (!document.getElementById("settingsDialog").open) render();
    }, 60000);
  </script>
</body>
</html>
