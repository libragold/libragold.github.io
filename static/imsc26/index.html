<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IMSC 2026 Schedule</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fafafa;
      --panel: #ffffff;
      --ink: #181c1f;
      --muted: #687076;
      --line: #e4e6e8;
      --line-strong: #cfd4d8;
      --accent: #1f5f8b;
      --accent-soft: #eaf2fb;
      --red: #a34343;
      --red-soft: #fbebeb;
      --gold: #966217;
      --gold-soft: #f8f0df;
      --green: #476b3c;
      --green-soft: #edf4e9;
      --shadow: 0 12px 28px rgba(24, 28, 31, 0.06);
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    [hidden] { display: none !important; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: var(--paper);
      color: var(--ink);
    }

    button, select, input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: rgba(250, 250, 250, 0.94);
      color: var(--ink);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .topbar {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 18px max(120px, clamp(16px, 3vw, 30px)) 16px clamp(16px, 3vw, 30px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.5vw, 2.05rem);
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 780;
    }

    .config-button {
      position: fixed;
      top: 9px;
      right: 14px;
      z-index: 20;
      min-width: 88px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      padding: 0 14px;
      font-size: 0.9rem;
      font-weight: 750;
      line-height: 1;
    }

    .config-button:hover {
      border-color: var(--line-strong);
      background: #f5f6f7;
    }

    .settings-dialog {
      width: min(980px, calc(100vw - 24px));
      max-height: min(760px, calc(100vh - 24px));
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 24px 70px rgba(24, 28, 31, 0.22);
    }

    .settings-dialog::backdrop {
      background: rgba(24, 28, 31, 0.34);
      backdrop-filter: blur(3px);
    }

    .settings-panel {
      display: grid;
      gap: 0;
    }

    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .settings-head h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .settings-body {
      padding: 14px;
      overflow: auto;
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--line);
    }

    .confirm-button {
      min-height: 38px;
      border: 0;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      padding: 0 16px;
      font-weight: 750;
    }

    main {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 2.2vw, 24px);
    }

    .controls {
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(250px, 1.05fr) minmax(250px, 1fr) minmax(250px, 1fr);
      align-items: start;
      margin-bottom: 12px;
    }

    .control-section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      min-width: 0;
    }

    .control-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .segmented {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #f3f4f5;
    }

    .segmented button {
      border: 0;
      border-right: 1px solid var(--line);
      padding: 8px 7px;
      background: transparent;
      color: var(--ink);
      min-height: 36px;
      font-weight: 700;
      font-size: 0.91rem;
    }

    .segmented button:last-child {
      border-right: 0;
    }

    .segmented button[aria-pressed="true"] {
      background: var(--ink);
      color: #fff;
    }

    .select-row {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 750;
    }

    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
    }

    .switches {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .check {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 5px 9px;
      background: #fff;
      color: var(--ink);
      font-weight: 650;
      font-size: 0.82rem;
    }

    .check input {
      accent-color: var(--accent);
      inline-size: 16px;
      block-size: 16px;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }

    .summary-title {
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.28rem);
      line-height: 1.2;
      font-weight: 760;
    }

    .summary-meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pill-row {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      max-width: 100%;
      border-radius: 999px;
      padding: 4px 9px;
      background: #f0f2f4;
      color: #3c4348;
      font-size: 0.74rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .content {
      min-height: 500px;
      min-width: 0;
    }

    .day-section {
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      overflow: hidden;
    }

    .day-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: #f5f6f7;
      border-bottom: 1px solid var(--line);
    }

    .day-header h2 {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 760;
    }

    .day-header span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .event-list {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .event-card {
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .event-card[data-kind="large"] { border-left-color: var(--red); }
    .event-card[data-kind="combined"] { border-left-color: var(--accent); }
    .event-card[data-kind="seminar"] { border-left-color: var(--gold); }
    .event-card[data-kind="guest"] { border-left-color: var(--green); }
    .event-card[data-kind="test"] { border-left-color: #7c4d9e; }
    .event-card[data-kind="problem"] { border-left-color: #8a5b25; }
    .event-card[data-kind="competition"] { border-left-color: #b48a21; }

    .event-topline {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: start;
      gap: 9px;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      color: var(--ink);
      white-space: nowrap;
      padding-top: 2px;
    }

    .event-title {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .tag {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--accent);
      background: var(--accent-soft);
      white-space: nowrap;
    }

    .tag.large { color: var(--red); background: var(--red-soft); }
    .tag.guest { color: var(--green); background: var(--green-soft); }
    .tag.showcase { color: var(--accent); background: var(--accent-soft); }
    .tag.seminar { color: var(--gold); background: var(--gold-soft); }
    .tag.test { color: #7c4d9e; background: #f1e9f8; }
    .tag.problem { color: #8a5b25; background: #f7eddf; }
    .tag.competition { color: #7a5b05; background: #fbf1c8; }

    .event-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 7px;
      margin-top: 2px;
    }

    .group-tile {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 7px;
      background: #fcfcfc;
      min-width: 0;
    }

    .group-tile strong {
      display: inline-block;
      margin-right: 6px;
      color: var(--accent);
      font-size: 0.79rem;
      line-height: inherit;
      font-weight: 750;
    }

    .group-tile span {
      color: var(--muted);
      font-size: 0.79rem;
      overflow-wrap: anywhere;
    }

    .empty {
      padding: 30px 18px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }

    .calendar-wrap {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior-x: contain;
      -webkit-overflow-scrolling: touch;
      contain: inline-size;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .calendar-grid {
      min-width: 880px;
      display: grid;
      grid-template-columns: 66px repeat(var(--day-count), minmax(190px, 1fr));
    }

    .corner,
    .cal-day-head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #202529;
      color: #fff;
      min-height: 54px;
      border-right: 1px solid rgba(255,255,255,0.14);
      display: grid;
      align-content: center;
      padding: 8px;
    }

    .corner {
      left: 0;
      z-index: 3;
      color: #d8dde1;
      font-size: 0.75rem;
      font-weight: 800;
    }

    .cal-day-head strong {
      font-size: 0.92rem;
      line-height: 1.1;
    }

    .cal-day-head span {
      color: #d8dde1;
      font-size: 0.75rem;
      margin-top: 3px;
    }

    .time-rail {
      position: relative;
      height: 880px;
      background: #f3f4f5;
      border-right: 1px solid var(--line);
    }

    .rail-label {
      position: absolute;
      left: 8px;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .cal-column {
      position: relative;
      height: 880px;
      border-right: 1px solid var(--line);
      background:
        repeating-linear-gradient(to bottom, #ffffff 0, #ffffff 79px, #f0f2f4 80px);
    }

    .cal-event {
      position: absolute;
      left: 7px;
      right: 7px;
      min-height: 44px;
      border-radius: var(--radius);
      padding: 7px 8px;
      border: 1px solid rgba(31, 95, 139, 0.22);
      background: var(--accent-soft);
      color: #173c5a;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(24, 28, 31, 0.08);
    }

    .cal-event[data-kind="large"] {
      border-color: rgba(177,59,59,0.28);
      background: var(--red-soft);
      color: #5b1c1c;
    }

    .cal-event[data-kind="combined"] {
      border-color: rgba(49,93,156,0.28);
      background: var(--accent-soft);
      color: #1d3d68;
    }

    .cal-event[data-kind="seminar"] {
      border-color: rgba(163,99,19,0.28);
      background: var(--gold-soft);
      color: #58350c;
    }

    .cal-event[data-kind="guest"] {
      border-color: rgba(83,107,47,0.30);
      background: var(--green-soft);
      color: #31411b;
    }

    .cal-event[data-kind="test"] {
      border-color: rgba(124,77,158,0.28);
      background: #f1e9f8;
      color: #47245f;
    }

    .cal-event[data-kind="problem"] {
      border-color: rgba(138,91,37,0.26);
      background: #f7eddf;
      color: #573711;
    }

    .cal-event[data-kind="competition"] {
      border-color: rgba(180,138,33,0.30);
      background: #fbf1c8;
      color: #513d05;
    }

    .cal-event strong,
    .cal-event span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cal-event strong {
      font-size: 0.78rem;
      line-height: 1.1;
    }

    .cal-event span {
      margin-top: 3px;
      font-size: 0.7rem;
      opacity: 0.85;
    }

    @media (max-width: 980px) {
      .topbar,
      .controls,
      .summary-strip {
        grid-template-columns: 1fr;
      }

      .pill-row {
        justify-content: flex-start;
      }

      .calendar-grid {
        min-width: 760px;
      }
    }

    @media (max-width: 640px) {
      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
      }

      .topbar {
        width: 100%;
        max-width: 100vw;
        padding: 14px 116px 12px 12px;
        gap: 10px;
      }

      main {
        width: 100%;
        max-width: 100vw;
        padding: 10px;
      }

      h1 {
        font-size: 1.35rem;
      }

      .controls {
        gap: 8px;
        margin-bottom: 10px;
        max-width: 100%;
      }

      .control-section {
        padding: 10px;
        max-width: 100%;
      }

      .control-title {
        margin-bottom: 7px;
      }

      .segmented button {
        min-height: 34px;
        padding: 7px 5px;
        font-size: 0.86rem;
      }

      .summary-strip {
        gap: 8px;
        padding: 10px;
        max-width: 100%;
      }

      .summary-meta {
        font-size: 0.84rem;
      }

      .pill-row {
        display: none;
      }

      .event-topline {
        grid-template-columns: 1fr auto;
        gap: 6px 8px;
      }

      .time {
        grid-column: 1 / 3;
        font-size: 0.86rem;
      }

      .event-title {
        font-size: 0.92rem;
      }

      .tag {
        width: max-content;
        max-width: 42vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mini-grid {
        grid-template-columns: 1fr;
      }

      .group-tile {
        display: block;
      }

      .calendar-grid {
        min-width: 650px;
        grid-template-columns: 58px repeat(var(--day-count), minmax(160px, 1fr));
      }

      .settings-dialog {
        width: calc(100vw - 20px);
        max-height: calc(100vh - 20px);
      }

      .settings-body {
        padding: 10px;
      }
    }

    @media (max-width: 420px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      h1 {
        max-width: none;
      }

      .check {
        flex: 1 1 145px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="topbar">
        <h1>IMSC 2026 Schedule</h1>
        <button type="button" class="config-button" id="openSettings">Settings</button>
      </div>
    </header>

    <dialog class="settings-dialog" id="settingsDialog">
      <div class="settings-panel">
        <div class="settings-head">
          <h2>Settings</h2>
        </div>
        <div class="settings-body">
      <section class="controls" aria-label="Calendar controls">
        <div class="control-section">
          <p class="control-title">Perspective</p>
          <div class="segmented" role="group" aria-label="Perspective">
            <button type="button" data-set="perspective" data-value="overall">Overall</button>
            <button type="button" data-set="perspective" data-value="instructor">Instructor</button>
            <button type="button" data-set="perspective" data-value="group">Team</button>
          </div>
          <div class="select-row" id="instructorRow">
            <label for="instructorSelect">Instructor or speaker</label>
            <select id="instructorSelect"></select>
          </div>
          <div class="select-row" id="groupRow">
            <label for="groupSelect">Team group</label>
            <select id="groupSelect"></select>
          </div>
        </div>

        <div class="control-section">
          <p class="control-title">View</p>
          <div class="segmented" role="group" aria-label="View mode">
            <button type="button" data-set="view" data-value="schedule">Schedule</button>
            <button type="button" data-set="view" data-value="calendar">Calendar</button>
          </div>
          <div class="switches">
            <label class="check"><input type="checkbox" id="showClassroom"> Classroom lectures</label>
            <label class="check"><input type="checkbox" id="showLarge"> Camp-wide events</label>
          </div>
        </div>

        <div class="control-section">
          <p class="control-title">Range</p>
          <div class="segmented" role="group" aria-label="Date range">
            <button type="button" data-set="range" data-value="weekly">Weekly</button>
            <button type="button" data-set="range" data-value="daily">Daily</button>
          </div>
          <div class="select-row">
            <label for="dateSelect" id="dateSelectLabel">Focus date</label>
            <select id="dateSelect"></select>
          </div>
        </div>
      </section>
        </div>
        <div class="settings-actions">
          <button type="button" class="confirm-button" id="confirmSettings">Confirm</button>
        </div>
      </div>
    </dialog>

    <main>
      <section class="summary-strip" aria-live="polite">
        <div>
          <h2 class="summary-title" id="summaryTitle"></h2>
          <p class="summary-meta" id="summaryMeta"></p>
        </div>
        <div class="pill-row" id="summaryPills"></div>
      </section>

      <section class="content" id="content" aria-live="polite"></section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "imsc2026.calendar.state.v1";
    const GROUPS = {

      G7: { teams: "Brazil, Malaysia", homeroom: "Wei Luo", location: "319" },

      G12: { teams: "Bangladesh, Croatia", homeroom: "Alex Song / Sari Ghanem", location: "206" },
      G13: { teams: "Cuba, Tajikistan", homeroom: "Andrei Bud", location: "307" },
      G14: { teams: "Macau-China, Moldova, International Union II (CA, JPN, UK, USA)", homeroom: "Zilin Jiang", location: "207" },
      G15: { teams: "Albania, Honduras, Pakistan", homeroom: "Tudor Paisanu", location: "313" },
      G16: { teams: "Costa Rica, Iceland, Nepal", homeroom: "Ivan Chan Kai Chin", location: "213" },
      G17: { teams: "Montenegro, Myanmar, Uruguay", homeroom: "Cipriana Anghel-Stan", location: "321" },
      G18: { teams: "Cameroon, Rwanda", homeroom: "Iulia Cristian", location: "216" },
      G19: { teams: "Botswana, Uganda, Ghana", homeroom: "Anca Sfia", location: "217" }
    };

    const DAY_META = [
      ["2026-06-22", "Monday", "Jun 22"],
      ["2026-06-23", "Tuesday", "Jun 23"],
      ["2026-06-24", "Wednesday", "Jun 24"],
      ["2026-06-25", "Thursday", "Jun 25"],
      ["2026-06-26", "Friday", "Jun 26"],

      const cut = raw.lastIndexOf("-");
      if (cut === -1) return { title: raw.trim(), instructor: "" };

    function minutes(time) {
      const [hours, mins] = time.split(":").map(Number);
      return hours * 60 + mins;
    }

    function compareEvents(a, b) {
      return a.date.localeCompare(b.date) || minutes(a.start) - minutes(b.start) || a.title.localeCompare(b.title);
    }

    function dayFor(date) {
      return DAY_META.find(day => day.date === date);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function formatTime(start, end) {
      return `${start}-${end}`;
    }

    function groupLocation(group) {
      return GROUPS[group]?.location ? `Room ${GROUPS[group].location}` : "";
    }

    function hasGroupLocation(event) {
      return ["classroom", "test", "problem", "study"].includes(event.kind);
    }

    function locationForEvent(event) {
      if (!hasGroupLocation(event)) return "";
      if (event.kind === "classroom") return groupLocation(event.groups[0]);
      if (state.perspective === "group") return groupLocation(state.group);
      const groups = event.groups?.length ? event.groups : GROUP_ORDER;
      return `Group rooms: ${groups.map(group => `${group} ${GROUPS[group].location}`).join(", ")}`;
    }

    function weekStartDate(date) {
      const focus = new Date(`${date}T12:00:00`);
      const day = focus.getDay() || 7;
      const monday = new Date(focus);
      monday.setDate(focus.getDate() - day + 1);
      return monday.toISOString().slice(0, 10);
    }

    function buildWeeks() {
      const weeks = new Map();
      DAY_META.forEach(day => {
        const start = weekStartDate(day.date);
        if (!weeks.has(start)) weeks.set(start, []);
        weeks.get(start).push(day.date);
      });
      return Array.from(weeks.entries()).map(([value, dates]) => {
        const first = dayFor(dates[0]);
        const last = dayFor(dates[dates.length - 1]);
        return {
          value,
          dates,
          label: first.date === last.date
            ? `Week of ${first.short}`
            : `Week of ${first.short}-${last.short}`
        };
      }).sort((a, b) => a.value.localeCompare(b.value));
    }

    function normalizedDateForRange(date, range) {
      if (range === "daily") {
        return DAY_META.some(day => day.date === date) ? date : DAY_META[0].date;
      }
      const start = weekStartDate(date);
      return WEEKS.some(week => week.value === start) ? start : WEEKS[0].value;
    }

    function dateRange() {
      if (state.range === "daily") return [state.date];
      const week = WEEKS.find(item => item.value === weekStartDate(state.date));
      return week ? week.dates : WEEKS[0].dates;
    }

    function appliesToPerspective(event) {
      if (event.global) return true;
      if (state.perspective === "overall") return true;
      if (state.perspective === "group") {
        return event.kind !== "classroom" || event.groups.includes(state.group);
      }
      return event.instructors.includes(state.instructor);
    }

    function filteredBaseEvents() {
      const dates = new Set(dateRange());
      return allEvents.filter(event => {
        if (!dates.has(event.date)) return false;
        if (event.kind === "classroom" && !state.showClassroom) return false;
        if (event.kind !== "classroom" && !state.showLarge) return false;
        return appliesToPerspective(event);
      });
    }

    function displayEvents() {
      const events = filteredBaseEvents();
      if (state.perspective !== "overall") return events;

      const combined = [];
      const groups = new Map();
      events.forEach(event => {
        if (event.kind !== "classroom") {
          combined.push(event);
          return;
        }
        const key = `${event.date}|${event.start}|${event.end}|${event.session}`;
        if (!groups.has(key)) {
          groups.set(key, {
            id: `combined-${key}`,
            date: event.date,
            start: event.start,
            end: event.end,
            kind: "combined",
            type: "Classroom Lectures",
            session: event.session,
            title: "classroom lectures",
            instructors: [],
            groups: [],
            children: []
          });
        }
        groups.get(key).children.push(event);
      });
      groups.forEach(group => {
        group.children.sort((a, b) => a.groups[0].localeCompare(b.groups[0], undefined, { numeric: true }));
        group.groups = group.children.flatMap(event => event.groups);
        group.instructors = Array.from(new Set(group.children.flatMap(event => event.instructors))).sort();
        combined.push(group);
      });
      return combined.sort(compareEvents);
    }

      if (state.perspective === "group") {
        const group = GROUPS[state.group];
        title = `${state.group} schedule`;
        meta = `${group.teams}. Homeroom instructor: ${group.homeroom}. Room: ${group.location}.`;
      }

      if (state.perspective === "instructor") {
        const homerooms = GROUP_ORDER.filter(group => GROUPS[group].homeroom.split(" / ").includes(state.instructor));
        title = `${state.instructor}'s schedule`;
        meta = homerooms.length
          ? `Homeroom: ${homerooms.map(group => `${group} (${GROUPS[group].teams})`).join(", ")}.`
          : "Teaching, showcase, seminar, and guest lecture appearances.";
      }

      if (firstDay && lastDay) {
        pills.push(firstDay.date === lastDay.date ? `${firstDay.weekday}, ${firstDay.short}` : `${firstDay.short}-${lastDay.short}`);
      }

      document.getElementById("summaryTitle").textContent = title;
      document.getElementById("summaryMeta").textContent = meta;
      document.getElementById("summaryPills").innerHTML = pills.map(pill => `<span class="pill">${escapeHtml(pill)}</span>`).join("");
    }

    function renderSchedule(events) {
      const content = document.getElementById("content");
      if (!events.length) {
        content.innerHTML = `<div class="empty">No events match this selection.</div>`;
        return;
      }
      content.innerHTML = dateRange().map(date => {
        const day = dayFor(date);
        const dayEvents = events.filter(event => event.date === date);
        if (!day || !dayEvents.length) return "";
        return `
          <section class="day-section">
            <div class="day-header">
              <h2>${day.weekday}</h2>
              <span>${day.short}, 2026</span>
            </div>
            <div class="event-list">
              ${dayEvents.map(renderEventCard).join("")}
            </div>
          </section>
        `;
      }).join("") || `<div class="empty">No events match this selection.</div>`;
    }

    function tagClass(event) {
      if (event.kind === "guest") return "guest";
      if (event.kind === "showcase") return "showcase large";
      if (event.kind === "seminar") return "seminar large";
      if (event.kind === "test") return "test";
      if (event.kind === "problem") return "problem";
      if (event.kind === "competition") return "competition";
      if (event.kind === "combined") return "showcase";
      return "";
    }

    function kindForCard(event) {
      if (event.kind === "guest") return "guest";
      if (event.kind === "seminar") return "seminar";
      if (event.kind === "showcase") return "large";
      if (event.kind === "problem") return "problem";
      if (event.kind === "competition") return "competition";
      if (event.kind === "test") return "test";
      return event.kind;
    }

    function renderEventCard(event) {
      const speakerLine = event.instructors?.length ? event.instructors.join(", ") : "";
      const groupLine = event.kind === "classroom" ? `${event.groups[0]}: ${event.teams}` : "";
      const locationLine = locationForEvent(event);
      const meta = event.children
        ? `${event.children.length} group lectures`
        : [speakerLine, groupLine, locationLine].filter(Boolean).join(" | ");
      return `
        <article class="event-card" data-kind="${kindForCard(event)}">
          <div class="event-topline">
            <div class="time">${formatTime(event.start, event.end)}</div>
            <div>
              <h3 class="event-title">${escapeHtml(event.session)}${event.kind === "classroom" ? ` - ${escapeHtml(event.title)}` : `: ${escapeHtml(event.title)}`}</h3>
              ${meta ? `<p class="event-meta">${escapeHtml(meta)}</p>` : ""}
            </div>
            <span class="tag ${tagClass(event)}">${escapeHtml(event.type)}</span>
          </div>
          ${event.children ? renderMiniGrid(event.children) : ""}
        </article>
      `;
    }

    function renderMiniGrid(children) {
      return `
        <div class="mini-grid">
          ${children.map(event => `
            <div class="group-tile">
              <strong>${event.groups[0]}</strong>
              <span>${escapeHtml(event.title)} - ${escapeHtml(event.instructors[0])} - Room ${escapeHtml(event.location)}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderCalendar(events) {
      const content = document.getElementById("content");
      const dates = dateRange();
      const startMinute = 8 * 60 + 30;
      const endMinute = 20 * 60 + 30;
      const height = 880;
      const pxPerMinute = height / (endMinute - startMinute);
      const hours = [];
      for (let hour = 9; hour <= 20; hour++) hours.push(hour);

      content.innerHTML = `
        <div class="calendar-wrap">
          <div class="calendar-grid" style="--day-count: ${dates.length}">
            <div class="corner">Time</div>
            ${dates.map(date => {
              const day = dayFor(date);
              return `<div class="cal-day-head"><strong>${day.weekday}</strong><span>${day.short}, 2026</span></div>`;
            }).join("")}
            <div class="time-rail">
              ${hours.map(hour => `<span class="rail-label" style="top:${(hour * 60 - startMinute) * pxPerMinute}px">${String(hour).padStart(2, "0")}:00</span>`).join("")}
            </div>
            ${dates.map(date => {
              const dayEvents = events.filter(event => event.date === date);
              return `
                <div class="cal-column">
                  ${dayEvents.map(event => {
                    const top = Math.max(0, (minutes(event.start) - startMinute) * pxPerMinute);
                    const eventHeight = Math.max(44, (minutes(event.end) - minutes(event.start)) * pxPerMinute - 5);
                    const title = event.kind === "combined" ? `${event.session}: ${event.children.length} group lectures` : `${event.session}: ${event.title}`;
                    const location = locationForEvent(event);
                    const tooltip = [title, location].filter(Boolean).join(" | ");
                    const sub = event.kind === "classroom"
                      ? `${event.groups[0]} | ${event.instructors[0]} | ${location}`
                      : [event.instructors.length ? event.instructors.join(", ") : "All groups", location].filter(Boolean).join(" | ");
                    return `
                      <article class="cal-event" data-kind="${kindForCard(event)}" style="top:${top}px;height:${eventHeight}px" title="${escapeHtml(tooltip)}">
                        <strong>${escapeHtml(formatTime(event.start, event.end))} ${escapeHtml(title)}</strong>
                        <span>${escapeHtml(sub)}</span>
                      </article>
                    `;
                  }).join("")}
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function render() {
      if (!instructors.includes(state.instructor)) state.instructor = instructors[0];
      if (!GROUPS[state.group]) state.group = GROUP_ORDER[0];
      if (!DAY_META.some(day => day.date === state.date)) state.date = DAY_META[0].date;
      state.date = normalizedDateForRange(state.date, state.range);
      syncControls();
      const events = displayEvents();
      renderSummary(events);
      if (state.view === "calendar") renderCalendar(events);
      else renderSchedule(events);
    }

    setupControls();
    render();
  </script>
</body>
</html>
